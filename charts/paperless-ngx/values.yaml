# ==============================================================================
# Global configuration
# ==============================================================================
global:
  # -- Global image registry (used as fallback for all components)
  imageRegistry: ""
  # -- Global deployment strategy (used as fallback for all components)
  strategy:
    type: Recreate

# ==============================================================================
# Main paperless-ngx configuration
# ==============================================================================
image:
  # -- Image registry (falls back to global.imageRegistry, then to ghcr.io)
  registry: ""
  repository: paperless-ngx/paperless-ngx
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Deployment strategy (falls back to global.strategy)
strategy: {}

# -- Additional init containers
extraInitContainers: []

# -- Environment variables to add to the pods
extraEnv: []
# -- Environment variables from secrets or configmaps to add to the pods
extraEnvFrom: []

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext: {}

service:
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts:
    - host: paperless.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# -- Gateway API HTTPRoute
route:
  enabled: false
  parentRefs:
    - name: gateway
      namespace: gateway-system
  hostnames:
    - paperless.local
  annotations: {}
  labels: {}

# -- Persistence configuration (single PVC with subPaths)
persistence:
  enabled: true
  size: 20Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  existingClaim: ""
  annotations: {}

resources: {}

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# -- Flower (Celery monitoring)
flower:
  enabled: false
  port: 5555
  ingress:
    enabled: false
    ingressClassName: ""
    annotations: {}
    hosts:
      - host: flower.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  route:
    enabled: false
    parentRefs:
      - name: gateway
        namespace: gateway-system
    hostnames:
      - flower.local
    annotations: {}
    labels: {}

# -- Tika server for advanced document parsing
tika:
  enabled: false
  image:
    # -- Registry (falls back to global.imageRegistry)
    registry: ""
    repository: apache/tika
    tag: "3.2.3.0"
    pullPolicy: IfNotPresent
  port: 9998
  # -- Strategy (falls back to global.strategy)
  strategy: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Gotenberg for document conversion
gotenberg:
  enabled: false
  image:
    # -- Registry (falls back to global.imageRegistry)
    registry: ""
    repository: gotenberg/gotenberg
    tag: "8.25.1"
    pullPolicy: IfNotPresent
  port: 3000
  # -- Strategy (falls back to global.strategy)
  strategy: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Monitoring configuration
monitoring:
  enabled: false
  # -- Type of service monitor: ServiceMonitor (Prometheus) or VMServiceScrape (VictoriaMetrics)
  type: ServiceMonitor
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  namespace: ""

  # -- Paperless exporter (prometheus-paperless-exporter)
  # Exports metrics from Paperless-ngx via REST API
  # Token is automatically created via post-install Job (creates "monitoring" user)
  paperlessExporter:
    enabled: true
    image:
      # -- Registry (falls back to global.imageRegistry, then to ghcr.io)
      registry: ""
      repository: hansmi/prometheus-paperless-exporter
      tag: "v0.0.9"
      pullPolicy: IfNotPresent
    port: 8081
    # -- Existing secret with API token (if set, disables auto-creation)
    existingSecret: ""
    # -- Key in the secret containing the API token
    secretKey: "api-token"
    # -- Collectors to enable (empty = all). Options: tag, correspondent, document_type, storage_path, task, log, group, user, document, status, statistics, remote_version
    collectors: []
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

  # -- kubectl image for init containers and jobs
  kubectl:
    # -- Registry (falls back to global.imageRegistry, then to docker.io)
    registry: ""
    repository: alpine/kubectl
    # -- Tag (empty = auto-detect from cluster version)
    tag: ""
    pullPolicy: IfNotPresent

  # -- Valkey/Redis exporter
  # Exports Redis-compatible metrics from Valkey
  valkeyExporter:
    enabled: true
    image:
      # -- Registry (falls back to global.imageRegistry, then to docker.io)
      registry: ""
      repository: oliver006/redis_exporter
      tag: "v1.80.1"
      pullPolicy: IfNotPresent
    port: 9121
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

# ==============================================================================
# Application configuration
# ==============================================================================
app:
  # -- Public URL of paperless-ngx (e.g., https://paperless.example.com)
  url: ""
  # -- CSRF trusted origins (comma-separated, defaults to app.url if set)
  csrfTrustedOrigins: ""

  # -- OCR languages to install and use (e.g., ["rus", "eng", "deu"])
  # First language is primary. English is always included.
  ocrLanguages: []

  # -- OCR mode: skip (default), redo, force
  ocrMode: "skip"

  # -- Date order for parsing: DMY, MDY, YMD
  dateOrder: "DMY"

  # -- Timezone (e.g., Europe/Moscow, UTC)
  timeZone: ""

  # -- Filename format template
  filenameFormat: ""
  # -- Remove 'none' placeholders from filename
  filenameFormatRemoveNone: true

  # -- Number of task workers
  taskWorkers: 1
  # -- Threads per worker
  threadsPerWorker: 1

  # -- Built-in Valkey (Redis)
  valkey:
    enabled: true
    # -- Prefix for Redis keys
    prefix: ""

  # -- External Valkey/Redis (when app.valkey.enabled=false)
  valkeyExternal:
    url: ""
    existingSecret: ""
    existingSecretKey: "url"

  # -- Database configuration
  database:
    host: ""
    port: 5432
    name: "paperless"
    user: "paperless"
    sslmode: "prefer"
    existingSecret: ""
    existingSecretKey: "password"
    password: ""

  # -- OIDC/SSO configuration
  oidc:
    enabled: false
    providerId: "keycloak"
    displayName: "SSO Login"
    serverUrl: ""
    existingSecret: ""
    clientIdKey: "client-id"
    clientSecretKey: "client-secret"
    clientId: ""
    clientSecret: ""
    disableRegularLogin: false
    redirectLoginToSSO: false

# ==============================================================================
# Paperless-AI configuration
# https://github.com/clusterzx/paperless-ai
# ==============================================================================
paperlessAi:
  enabled: false
  image:
    # -- Registry (falls back to global.imageRegistry)
    registry: ""
    repository: clusterzx/paperless-ai
    tag: "3.0.9"
    pullPolicy: IfNotPresent

  # -- Strategy (falls back to global.strategy)
  strategy: {}

  # AI Provider: openai, ollama, custom
  provider: "openai"

  # OpenAI settings
  openai:
    model: "gpt-4o-mini"
    existingSecret: ""
    secretKey: "api-key"
    apiKey: ""

  # Ollama settings
  ollama:
    url: "http://ollama:11434"
    model: "llama3.2"

  # Custom provider settings
  custom:
    url: ""
    model: ""
    existingSecret: ""
    secretKey: "api-key"
    apiKey: ""

  # Paperless-ngx connection
  paperless:
    # -- Use shared API token from monitoring (created automatically)
    useSharedToken: true
    # -- Existing secret with API token (overrides useSharedToken)
    existingSecret: ""
    secretKey: "api-token"
    # -- API token (if not using existingSecret or useSharedToken)
    apiToken: ""

  # Processing settings
  scanInterval: "*/30 * * * *"
  addProcessedTag: true
  processedTagName: "ai-processed"
  processExistingDocuments: false

  # Persistence for /app/data
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
    existingClaim: ""

  # Ingress for web UI
  ingress:
    enabled: false
    ingressClassName: ""
    annotations: {}
    host: paperless-ai.local
    tls: []

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ==============================================================================
# PostgreSQL subchart configuration
# See https://artifacthub.io/packages/helm/cloudpirates-postgres/postgres
# ==============================================================================
# -- Optional CloudPirates PostgreSQL dependency. Disabled by default so existing
# users can keep using an external PostgreSQL instance.
postgresql:
  enabled: false
  image:
    tag: "16"  # paperless-ngx project docs say it supports v13-17. Using v16 for now to be conservative.
  # -- Override the PostgreSQL release fullname. Leave empty to use the
  # dependency chart's default fullname. If enabled by this chart, this is useful
  # for producing a predictable service name:
  fullnameOverride: ""
  # -- Number of PostgreSQL pods. The CloudPirates chart defaults to 1 and plain
  # PostgreSQL does not provide multi-master replication by default:
  replicaCount: 1
  auth:
    # -- PostgreSQL superuser name. Empty means the upstream postgres image uses
    # its default postgres user:
    username: ""
    # -- PostgreSQL superuser password. Auto-generated by the dependency when
    # empty. Can be set from CI with --set postgresql.auth.password=... :
    password: ""
    # -- Default database for the superuser. Empty defaults to the superuser name:
    database: ""
    # -- Existing secret containing the superuser password. When set, the
    # dependency does not create its own admin credentials secret:
    existingSecret: ""
    secretKeys:
      # -- Key in auth.existingSecret containing the superuser password:
      adminPasswordKey: postgres-password

  # -- Optional non-superuser account for Paperless. When enabled, the dependency
  # creates a separate <fullname>-custom-user-credentials Secret containing
  # CUSTOM_USER, CUSTOM_DB, and CUSTOM_PASSWORD:
  customUser:
    name: paperless
    database: paperless
    # -- Paperless database user password. Auto-generated and preserved by the
    # dependency when empty. Can be set from CI with
    # --set postgresql.customUser.password=...
    password: ""
    # -- Existing secret for the custom Paperless database user. When set, the
    # dependency does not generate the custom-user credentials secret:
    existingSecret: ""
    secretKeys:
      # -- Key containing the custom PostgreSQL user name:
      name: CUSTOM_USER
      # -- Key containing the custom PostgreSQL database name:
      database: CUSTOM_DB
      # -- Key containing the custom PostgreSQL user password:
      password: CUSTOM_PASSWORD

  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

  metrics:
    enabled: false
    serviceMonitor:
      enabled: false

# ==============================================================================
# Valkey subchart configuration
# See https://github.com/valkey-io/valkey-helm for all options
# ==============================================================================
valkey: {}
